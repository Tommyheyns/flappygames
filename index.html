<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flappy Games">
<title>Flappy Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Georgia,serif;overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none;}
#menu{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;background:linear-gradient(160deg,#1a0a2e,#2d1b5e,#3b0f5e);padding:20px;}
#menu h1{font-size:30px;color:#f0abfc;text-shadow:0 0 20px rgba(240,171,252,0.8);margin-bottom:4px;letter-spacing:2px;}
#menu p{color:rgba(200,180,255,0.6);font-size:12px;margin-bottom:22px;font-family:'Courier New',monospace;letter-spacing:2px;}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:340px;}
.level-card{border-radius:16px;padding:16px 10px 12px;cursor:pointer;border:2px solid rgba(255,255,255,0.15);text-align:center;position:relative;}
.level-card:active{transform:scale(0.95);}
.level-card .emoji{font-size:36px;display:block;margin-bottom:5px;}
.level-card .name{font-size:13px;font-weight:bold;letter-spacing:1px;}
.level-card .sub{font-size:10px;margin-top:3px;opacity:0.75;font-family:'Courier New',monospace;line-height:1.4;}
.level-card .best-badge{position:absolute;top:7px;right:7px;font-size:9px;font-family:'Courier New',monospace;background:rgba(0,0,0,0.3);border-radius:8px;padding:2px 5px;opacity:0.8;}
.card-shake{background:linear-gradient(135deg,#500724,#831843);color:#fce7f3;}
.card-coffee{background:linear-gradient(135deg,#451a03,#78350f);color:#fef3c7;}
.card-bee{background:linear-gradient(135deg,#422006,#854d0e);color:#fefce8;}
.card-fish{background:linear-gradient(135deg,#0c4a6e,#075985);color:#e0f2fe;}
.card-space{background:linear-gradient(135deg,#0f0520,#1e1b4b);color:#e0e7ff;}
.card-pizza{background:linear-gradient(135deg,#7f1d1d,#991b1b);color:#fef2f2;}
#gameWrap{display:none;position:fixed;top:0;left:0;right:0;bottom:0;align-items:center;justify-content:center;flex-direction:column;}
#backBtn{position:fixed;top:12px;left:12px;background:rgba(0,0,0,0.4);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;z-index:100;font-family:'Courier New',monospace;letter-spacing:1px;}
canvas{border-radius:10px;display:block;}
#hint{margin-top:10px;font-size:10px;letter-spacing:3px;font-family:'Courier New',monospace;}
</style>
</head>
<body>
<div id="menu">
  <h1>FLAPPY GAMES</h1>
  <p>choose your adventure</p>
  <div class="level-grid">
    <div class="level-card card-shake" onclick="startGame('shake')">
      <span class="emoji">&#x1F964;</span>
      <div class="name">FLAPPY SHAKE</div>
      <div class="sub">dodge lollipops<br>&amp; candy canes</div>
      <div class="best-badge" id="best-shake"></div>
    </div>
    <div class="level-card card-coffee" onclick="startGame('coffee')">
      <span class="emoji">&#x2615;</span>
      <div class="name">FLAPPY COFFEE</div>
      <div class="sub">dodge your<br>responsibilities</div>
      <div class="best-badge" id="best-coffee"></div>
    </div>
    <div class="level-card card-bee" onclick="startGame('bee')">
      <span class="emoji">&#x1F41D;</span>
      <div class="name">FLAPPY BEE</div>
      <div class="sub">dodge flowers<br>&amp; beehives</div>
      <div class="best-badge" id="best-bee"></div>
    </div>
    <div class="level-card card-fish" onclick="startGame('fish')">
      <span class="emoji">&#x1F420;</span>
      <div class="name">FLAPPY FISH</div>
      <div class="sub">dodge jellyfish<br>&amp; seaweed</div>
      <div class="best-badge" id="best-fish"></div>
    </div>
    <div class="level-card card-space" onclick="startGame('space')">
      <span class="emoji">&#x1F680;</span>
      <div class="name">FLAPPY SPACE</div>
      <div class="sub">dodge asteroids<br>&amp; planets</div>
      <div class="best-badge" id="best-space"></div>
    </div>
    <div class="level-card card-pizza" onclick="startGame('pizza')">
      <span class="emoji">&#x1F355;</span>
      <div class="name">FLAPPY PIZZA</div>
      <div class="sub">dodge broccoli<br>&amp; carrots</div>
      <div class="best-badge" id="best-pizza"></div>
    </div>
  </div>
</div>
<div id="gameWrap">
  <button id="backBtn" onclick="goBack()">&#8592; menu</button>
  <canvas id="c"></canvas>
  <div id="hint"></div>
</div>
<script>
var W=360,H=580,GAP=195,PIPE_W=58,PIPE_SPEED=1.7;
var GRAVITY=0.19,FLAP_V=-5,PIPE_INTERVAL=100;
var DPR=Math.min(window.devicePixelRatio||1,2);
var CX=75,CR=18;

function rand(min,max){return min+Math.random()*(max-min);}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function updateBadges(){
  ['shake','coffee','bee','fish','space','pizza'].forEach(function(k){
    var b=parseInt(localStorage.getItem('flappy_'+k+'_best')||'0');
    var el=document.getElementById('best-'+k);
    if(el) el.textContent=b>0?'best: '+b:'';
  });
}
updateBadges();

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var phase,bird,pipes,particles,frame,score,scroll,pipeIdx,deathTimer,currentTheme,deathMsg;
var rafId=null;

function resetGame(){
  bird={y:H/2,vy:0,angle:0,flap:0};
  pipes=[];particles=[];frame=0;score=0;scroll=0;pipeIdx=0;deathTimer=0;deathMsg='';
  phase='idle';
  // reset label counter for coffee
  if(currentTheme==='coffee') THEMES.coffee.labelIdx=0;
}

function startGame(theme){
  currentTheme=theme;
  document.getElementById('menu').style.display='none';
  var gw=document.getElementById('gameWrap');
  gw.style.display='flex';
  gw.style.background=THEMES[theme].bg;
  document.getElementById('hint').style.color=THEMES[theme].hintCol;
  document.getElementById('hint').textContent='tap / click / space';
  canvas.width=W*DPR;canvas.height=H*DPR;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  canvas.style.border='2px solid '+THEMES[theme].borderCol;
  canvas.style.boxShadow='0 0 50px '+THEMES[theme].glowCol;
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(DPR,DPR);
  resetGame();
  if(rafId) cancelAnimationFrame(rafId);
  loop();
}

function goBack(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('menu').style.display='flex';
  updateBadges();
}

function tap(){
  if(phase==='idle'){
    phase='playing';
    bird.vy=FLAP_V;bird.flap=10;
  } else if(phase==='playing'){
    bird.vy=FLAP_V;bird.flap=10;
    var t=THEMES[currentTheme];
    burst(bird.y,t.p1,6);burst(bird.y,t.p2,4);
  } else if(phase==='dead'&&deathTimer<=0){
    // FIX: full reset then go to idle
    resetGame();
  }
}

canvas.addEventListener('pointerdown',function(e){e.preventDefault();tap();});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();tap();}
});

function burst(y,col,n){
  for(var i=0;i<n;i++)
    particles.push({x:CX,y:y,vx:rand(-3.5,3.5),vy:rand(-4,0.5),life:1,col:col,r:rand(2,5)});
}

// ===================== DRAW HELPERS =====================
function drawLollyHead(cx,cy,r){
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
  var lg=ctx.createRadialGradient(-4,-4,2,0,0,r);
  lg.addColorStop(0,'#f9a8d4');lg.addColorStop(0.5,'#ec4899');lg.addColorStop(1,'#be185d');
  ctx.fillStyle=lg;ctx.fill();ctx.strokeStyle='#9d174d';ctx.lineWidth=1.2;ctx.stroke();
  for(var i=0;i<4;i++){
    ctx.save();ctx.rotate(i*Math.PI/2);
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,r,0,Math.PI/2);ctx.closePath();
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fill();ctx.restore();
  }
  ctx.beginPath();ctx.ellipse(-5,-5,4,2.5,-0.7,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();ctx.restore();
}

function drawFlowerHead(cx,cy,r){
  ctx.save();ctx.translate(cx,cy);
  var petals=['#fbbf24','#f59e0b','#fde68a','#fcd34d','#f97316','#fb923c'];
  for(var i=0;i<6;i++){
    ctx.save();ctx.rotate(i*Math.PI/3);
    ctx.beginPath();ctx.ellipse(0,-r*0.65,r*0.3,r*0.5,0,0,Math.PI*2);
    ctx.fillStyle=petals[i%6];ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=0.5;ctx.stroke();ctx.restore();
  }
  ctx.beginPath();ctx.arc(0,0,r*0.35,0,Math.PI*2);
  var cG=ctx.createRadialGradient(0,0,1,0,0,r*0.35);
  cG.addColorStop(0,'#fef9c3');cG.addColorStop(1,'#fbbf24');
  ctx.fillStyle=cG;ctx.fill();ctx.strokeStyle='#d97706';ctx.lineWidth=0.8;ctx.stroke();
  ctx.restore();
}

function drawHive(cx,cy,w,h){
  ctx.save();ctx.translate(cx,cy);
  var hG=ctx.createLinearGradient(-w/2,-h/2,w/2,h/2);
  hG.addColorStop(0,'#fde68a');hG.addColorStop(0.5,'#fbbf24');hG.addColorStop(1,'#d97706');
  ctx.beginPath();
  ctx.moveTo(0,-h/2);ctx.lineTo(w/2,-h/4);ctx.lineTo(w/2,h/4);
  ctx.lineTo(0,h/2);ctx.lineTo(-w/2,h/4);ctx.lineTo(-w/2,-h/4);ctx.closePath();
  ctx.fillStyle=hG;ctx.fill();ctx.strokeStyle='#92400e';ctx.lineWidth=1.2;ctx.stroke();
  ctx.strokeStyle='rgba(146,64,14,0.3)';ctx.lineWidth=1;
  for(var i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(-w/2+2,i*6);ctx.lineTo(w/2-2,i*6);ctx.stroke();}
  ctx.fillStyle='#92400e';ctx.beginPath();ctx.ellipse(0,h/4,4,3,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawJellyfish(cx,cy,r,dir){
  ctx.save();ctx.translate(cx,cy);
  if(dir==='bot') ctx.scale(1,-1);
  var jG=ctx.createRadialGradient(0,-r*0.3,2,0,0,r);
  jG.addColorStop(0,'rgba(216,180,254,0.9)');jG.addColorStop(0.7,'rgba(167,139,250,0.8)');jG.addColorStop(1,'rgba(139,92,246,0.6)');
  ctx.beginPath();ctx.arc(0,0,r,Math.PI,0);
  ctx.quadraticCurveTo(r,r*0.3,0,r*0.5);ctx.quadraticCurveTo(-r,r*0.3,-r,0);
  ctx.fillStyle=jG;ctx.fill();ctx.strokeStyle='rgba(167,139,250,0.8)';ctx.lineWidth=1;ctx.stroke();
  ctx.strokeStyle='rgba(196,181,253,0.7)';ctx.lineWidth=1.2;ctx.lineCap='round';
  var t=Date.now()/400;
  for(var i=-2;i<=2;i++){
    ctx.beginPath();ctx.moveTo(i*5,r*0.5);
    ctx.quadraticCurveTo(i*5+Math.sin(t+i)*6,r*1.2,i*5+Math.sin(t+i+1)*4,r*1.8);ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.arc(-r*0.3,-r*0.4,r*0.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.2,-r*0.3,r*0.1,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawSeaweed(x,y,h,seed){
  ctx.save();
  var cols=['#16a34a','#15803d','#166534'];
  ctx.strokeStyle=cols[seed%3];ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x,y+h);
  var segs=Math.floor(h/20);
  for(var i=1;i<=segs;i++){ctx.lineTo(x+Math.sin((seed+i)*1.2)*12,y+h-i*20);}
  ctx.stroke();
  ctx.strokeStyle=cols[(seed+1)%3];ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x,y+h);
  for(var i2=1;i2<=segs;i2++){ctx.lineTo(x+Math.sin((seed+i2)*1.2)*12,y+h-i2*20);}
  ctx.stroke();ctx.restore();
}

function drawAsteroid(cx,cy,r,seed){
  ctx.save();ctx.translate(cx,cy);
  ctx.beginPath();
  var pts=8;
  for(var i=0;i<pts;i++){
    var a=i*Math.PI*2/pts;
    var rr2=r*(0.7+0.3*Math.sin(seed+i*2.3));
    if(i===0)ctx.moveTo(Math.cos(a)*rr2,Math.sin(a)*rr2);
    else ctx.lineTo(Math.cos(a)*rr2,Math.sin(a)*rr2);
  }
  ctx.closePath();
  var aG=ctx.createRadialGradient(-r*0.3,-r*0.3,1,0,0,r);
  aG.addColorStop(0,'#9ca3af');aG.addColorStop(0.6,'#6b7280');aG.addColorStop(1,'#374151');
  ctx.fillStyle=aG;ctx.fill();ctx.strokeStyle='#4b5563';ctx.lineWidth=1;ctx.stroke();
  // craters
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.arc(-r*0.2,-r*0.2,r*0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.3,r*0.1,r*0.12,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPlanet(cx,cy,r,col1,col2){
  ctx.save();ctx.translate(cx,cy);
  var pG=ctx.createRadialGradient(-r*0.3,-r*0.3,1,0,0,r);
  pG.addColorStop(0,col1);pG.addColorStop(1,col2);
  ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=pG;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.stroke();
  // rings
  ctx.save();ctx.rotate(0.4);ctx.scale(1,0.35);
  ctx.beginPath();ctx.arc(0,0,r*1.6,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,r*1.9,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.stroke();
  ctx.restore();
  // shine
  ctx.fillStyle='rgba(255,255,255,0.25)';
  ctx.beginPath();ctx.ellipse(-r*0.3,-r*0.3,r*0.35,r*0.2,-0.5,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBroccoli(cx,cy,r){
  ctx.save();ctx.translate(cx,cy);
  ctx.fillStyle='#15803d';ctx.strokeStyle='#14532d';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(-r*0.25,-r*0.1,r*0.5,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(r*0.25,-r*0.1,r*0.5,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.arc(0,-r*0.45,r*0.55,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#22c55e';
  ctx.beginPath();ctx.arc(-r*0.1,-r*0.5,r*0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.2,-r*0.15,r*0.15,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a16207';ctx.strokeStyle='#78350f';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,r*0.3);ctx.lineTo(0,r*0.9);ctx.stroke();
  ctx.restore();
}

function drawCarrot(cx,cy,r){
  ctx.save();ctx.translate(cx,cy);
  var cG=ctx.createLinearGradient(0,-r,0,r);
  cG.addColorStop(0,'#f97316');cG.addColorStop(1,'#ea580c');
  ctx.fillStyle=cG;
  ctx.beginPath();ctx.moveTo(-r*0.5,-r*0.2);ctx.lineTo(r*0.5,-r*0.2);
  ctx.quadraticCurveTo(r*0.3,r*0.5,0,r*0.9);
  ctx.quadraticCurveTo(-r*0.3,r*0.5,-r*0.5,-r*0.2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#c2410c';ctx.lineWidth=0.8;ctx.stroke();
  // lines
  ctx.strokeStyle='rgba(194,65,12,0.4)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-r*0.2,0);ctx.lineTo(-r*0.1,r*0.6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(r*0.2,0);ctx.lineTo(r*0.1,r*0.6);ctx.stroke();
  // greens
  ctx.strokeStyle='#16a34a';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,-r*0.2);ctx.quadraticCurveTo(-r*0.4,-r*0.8,-r*0.3,-r*1.1);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-r*0.2);ctx.quadraticCurveTo(0,-r*0.9,0,-r*1.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,-r*0.2);ctx.quadraticCurveTo(r*0.4,-r*0.8,r*0.3,-r*1.1);ctx.stroke();
  ctx.restore();
}

// ===================== THEMES =====================
var THEMES={

shake:{
  bg:'#500724',borderCol:'#f9a8d4',glowCol:'rgba(249,168,212,0.25)',
  hintCol:'rgba(249,168,212,0.5)',p1:'#fda4af',p2:'#fff',
  scoreColor:'#be185d',scoreShadow:'rgba(236,72,153,0.5)',
  overlayBg:'rgba(253,242,248,0.78)',cardCol:'rgba(255,228,230,0.95)',
  titleCol:'#be185d',subtitleCol:'#9d174d',borderCol2:'#f9a8d4',
  titleText:'FLAPPY SHAKE',subtitleText:'milkshake edition',
  deathMsgs:['total meltdown!','spilled everywhere!','needs a refill!','too much brain freeze!','the straw gave up!'],
  scoreLabel:'dodged',
  nextType:function(i){return i%2===0?'lollipop':'candycane';},
  drawHero:function(by,bvy,bang,bflap){
    ctx.save();ctx.translate(CX,by);ctx.rotate(Math.max(-0.35,Math.min(0.9,bang)));ctx.scale(1.9,1.9);
    if(bflap>0){var a=bflap/12;[[-3,-22,3],[-7,-17,2],[5,-20,2.5],[8,-14,2],[-9,-13,1.5]].forEach(function(d){ctx.beginPath();ctx.arc(d[0],d[1],d[2],0,Math.PI*2);ctx.fillStyle='rgba(255,182,193,'+(a*0.9)+')';ctx.fill();});}
    ctx.strokeStyle='#ff6b9d';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(5,-12);ctx.lineTo(8,-30);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=0.8;for(var i=0;i<4;i++){var sy=-14-i*4;ctx.beginPath();ctx.moveTo(5,sy);ctx.lineTo(6.8,sy+2.5);ctx.stroke();}
    var cg=ctx.createRadialGradient(0,-12,1,0,-12,9);cg.addColorStop(0,'#fff');cg.addColorStop(1,'#ffe4e1');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,-12,8,Math.PI,0);ctx.bezierCurveTo(6,-15,4,-20,0,-22);ctx.bezierCurveTo(-4,-20,-6,-15,-8,-12);ctx.closePath();ctx.fill();
    ctx.fillStyle='#dc2626';ctx.beginPath();ctx.arc(0,-23,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(-9,11);ctx.lineTo(-10,-10);ctx.quadraticCurveTo(-10,-13,-7,-13);ctx.lineTo(7,-13);ctx.quadraticCurveTo(10,-13,10,-10);ctx.lineTo(9,11);ctx.closePath();
    var cupG=ctx.createLinearGradient(-10,0,10,0);cupG.addColorStop(0,'#fce7f3');cupG.addColorStop(0.5,'#fdf2f8');cupG.addColorStop(1,'#fbcfe8');
    ctx.fillStyle=cupG;ctx.fill();ctx.strokeStyle='#f9a8d4';ctx.lineWidth=1;ctx.stroke();
    [[-3,2],[3,6],[-4,7],[4,1]].forEach(function(d){ctx.beginPath();ctx.arc(d[0],d[1],1.2,0,Math.PI*2);ctx.fillStyle='rgba(249,168,212,0.6)';ctx.fill();});
    ctx.beginPath();ctx.ellipse(0,-11,6.5,2,0,0,Math.PI*2);var sg=ctx.createRadialGradient(0,-11,1,0,-11,6.5);sg.addColorStop(0,'#fda4af');sg.addColorStop(1,'#fb7185');ctx.fillStyle=sg;ctx.fill();
    var blink=bflap>6||bvy>3;
    if(blink){ctx.strokeStyle='#be185d';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(-3,-3,2.5,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();ctx.beginPath();ctx.arc(3,-3,2.5,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();}

      drawSeaweed(p.x+10,0,p.topH,1);drawSeaweed(p.x+PIPE_W-14,0,p.topH,2);
      drawSeaweed(p.x+10,botY,H-60-botY,3);drawSeaweed(p.x+PIPE_W-14,botY,H-60-botY,4);
    }
  },
  // Custom collision for fish - jellyfish only hurt in tentacle zone (lower half)
  customCollide:function(p,bx,by){
    var botY=p.topH+GAP;
    if(p.type==='jellyfish'){
      var jcx=p.x+PIPE_W/2,jr=24;
      // top jelly: only collide if bird is BELOW the dome (in tentacle zone)
      var topJellyBase=p.topH-10; // cy of top jelly
      if(bx+CR>jcx-jr*0.8&&bx-CR<jcx+jr*0.8){
        // tentacles extend from topJellyBase downward to topJellyBase+jr*1.8
        if(by+CR>topJellyBase&&by-CR<topJellyBase+jr*1.8){return true;}
      }
      // bottom jelly: only collide if bird is ABOVE the dome (in tentacle zone of inverted)
      var botJellyBase=botY+10;
      if(bx+CR>jcx-jr*0.8&&bx-CR<jcx+jr*0.8){
        if(by-CR<botJellyBase&&by+CR>botJellyBase-jr*1.8){return true;}
      }
      return false;
    } else {
      // seaweed uses standard pipe width
      return bx+CR>p.x+8&&bx-CR<p.x+PIPE_W-8&&(by-CR<p.topH||by+CR>botY);
    }
  },
  drawBg:function(){
    var sky=ctx.createLinearGradient(0,0,0,H-60);sky.addColorStop(0,'#0ea5e9');sky.addColorStop(0.4,'#0284c7');sky.addColorStop(1,'#0369a1');ctx.fillStyle=sky;ctx.fillRect(0,0,W,H-60);
    ctx.save();for(var i=0;i<5;i++){var rx=60+i*60;ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx-40,H-60);ctx.lineTo(rx+40,H-60);ctx.closePath();ctx.fillStyle='rgba(186,230,253,0.04)';ctx.fill();}ctx.restore();
    ctx.strokeStyle='rgba(186,230,253,0.3)';ctx.lineWidth=0.8;[[30,100,4],[80,200,3],[150,80,5],[250,150,3],[310,250,4],[200,300,2]].forEach(function(b){ctx.beginPath();ctx.arc(b[0],b[1],b[2],0,Math.PI*2);ctx.stroke();});
  },
  drawGround:function(sc){
    var gG=ctx.createLinearGradient(0,H-60,0,H);gG.addColorStop(0,'#1e3a5f');gG.addColorStop(1,'#0f172a');ctx.fillStyle=gG;ctx.fillRect(0,H-60,W,60);
    ctx.fillStyle='rgba(56,189,248,0.3)';ctx.fillRect(0,H-60,W,3);
    ctx.strokeStyle='rgba(148,163,184,0.2)';ctx.lineWidth=1;var off=sc%40;
    for(var x=-40+(-off%40);x<W+40;x+=40){ctx.beginPath();ctx.moveTo(x,H-45);ctx.quadraticCurveTo(x+20,H-50,x+40,H-45);ctx.stroke();}
  },
},

}; // end THEMES

// ===================== GAME LOOP =====================
function update(){
  var t=THEMES[currentTheme];
  if(phase!=='playing'){
    if(phase==='dead'&&deathTimer>0) deathTimer--;
    particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.045;});
    particles=particles.filter(function(p){return p.life>0;});
    return;
  }
  frame++;scroll+=PIPE_SPEED;
  bird.vy+=GRAVITY;bird.y+=bird.vy;bird.angle=bird.vy*0.07;
  if(bird.flap>0) bird.flap--;

  if(frame%PIPE_INTERVAL===0){
    var minT=65,maxT=H-60-GAP-65;
    var type=t.nextType(pipeIdx);
    var p={x:W+12,topH:rand(minT,maxT),scored:false,type:type};
    if(currentTheme==='coffee'){p.label=t.labels[t.labelIdx%t.labels.length];t.labelIdx++;}
    if(currentTheme==='space'){p.seed=rand(1,10);if(type==='planet'){p.planetCols=t.planets[t.planetIdx%t.planets.length];t.planetIdx++;}}
    pipes.push(p);pipeIdx++;
  }
  pipes.forEach(function(p){
    p.x-=PIPE_SPEED;
    if(!p.scored&&p.x+PIPE_W<CX){p.scored=true;score++;burst(bird.y,t.p1,10);burst(bird.y,t.p2,6);}
  });
  pipes=pipes.filter(function(p){return p.x>-PIPE_W-12;});
  particles.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=0.045;});
  particles=particles.filter(function(p){return p.life>0;});

  if(bird.y+CR*1.8>=H-60||bird.y-CR*1.8<=0){die();return;}
  for(var i=0;i<pipes.length;i++){
    var p=pipes[i];
    var hit=false;
    if(t.customCollide){
      hit=t.customCollide(p,CX,bird.y);
    } else {
      if(CX+CR>p.x+4&&CX-CR<p.x+PIPE_W-4){
        var botY=p.topH+GAP;
        if(bird.y-CR*1.3<p.topH||bird.y+CR*1.3>botY){hit=true;}
      }
    }
    if(hit){die();return;}
  }
}

function die(){
  var t=THEMES[currentTheme];
  burst(bird.y,t.p1,22);burst(bird.y,t.p2,12);
  deathMsg=pick(t.deathMsgs);
  var best=parseInt(localStorage.getItem('flappy_'+currentTheme+'_best')||'0');
  if(score>best) localStorage.setItem('flappy_'+currentTheme+'_best',score);
  phase='dead';deathTimer=42;
}

function draw(){
  var t=THEMES[currentTheme];
  var best=parseInt(localStorage.getItem('flappy_'+currentTheme+'_best')||'0');
  t.drawBg();
  pipes.forEach(function(p){t.drawObstacle(p);});
  t.drawGround(scroll);
  if(phase!=='idle') t.drawHero(bird.y,bird.vy,bird.angle,bird.flap);
  particles.forEach(function(p){
    ctx.save();ctx.globalAlpha=p.life*0.85;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  if(phase==='playing'){
    ctx.textAlign='center';ctx.fillStyle=t.scoreColor;ctx.shadowColor=t.scoreShadow;ctx.shadowBlur=14;
    ctx.font='bold 46px Georgia,serif';ctx.fillText(score,W/2,60);ctx.shadowBlur=0;
  }
  if(phase==='idle'||phase==='dead'){
    ctx.fillStyle=t.overlayBg;ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    if(phase==='idle'){
      ctx.save();ctx.fillStyle=t.cardCol;rr(ctx,W/2-140,H/2-115,280,85,16);ctx.fill();ctx.strokeStyle=t.borderCol;ctx.lineWidth=2;ctx.stroke();ctx.restore();
      ctx.fillStyle=t.titleCol;ctx.font='bold 26px Georgia,serif';ctx.fillText(t.titleText,W/2,H/2-75);
      ctx.fillStyle=t.subtitleCol;ctx.font="13px 'Courier New'";ctx.fillText(t.subtitleText,W/2,H/2-52);
      if(best>0){ctx.font="11px 'Courier New'";ctx.fillText('best: '+best,W/2,H/2-32);}
      t.drawHero(H/2+60,0,0,0);
      ctx.fillStyle=Math.sin(Date.now()/420)>0?t.titleCol:'rgba(255,255,255,0.1)';
      ctx.font="13px 'Courier New'";ctx.fillText('tap / click / space',W/2,H/2+135);
    } else {
      ctx.save();ctx.fillStyle=t.cardCol;rr(ctx,W/2-130,H/2-115,260,195,16);ctx.fill();ctx.strokeStyle=t.borderCol;ctx.lineWidth=1.8;ctx.stroke();ctx.restore();
      ctx.fillStyle=t.titleCol;ctx.font='bold 22px Georgia,serif';ctx.fillText(deathMsg,W/2,H/2-75);
      ctx.fillStyle=t.subtitleCol;ctx.font='17px Georgia,serif';ctx.fillText(score+' '+t.scoreLabel,W/2,H/2-44);
      ctx.font="12px 'Courier New'";ctx.fillText('best: '+best,W/2,H/2-20);
      var mi=score>=30?'\uD83C\uDFC6':score>=15?'\uD83E\uDD47':score>=8?'\uD83E\uDD48':score>=3?'\uD83E\uDD49':'';
      if(mi){ctx.font='32px serif';ctx.fillText(mi,W/2,H/2+18);}
      if(deathTimer<=0){
        ctx.fillStyle=Math.sin(Date.now()/420)>0?t.titleCol:'rgba(255,255,255,0.1)';
        ctx.font="12px 'Courier New'";ctx.fillText('tap to try again',W/2,H/2+(mi?62:42));
      }
    }
  }
}

function loop(){update();draw();rafId=requestAnimationFrame(loop);}
</script>
